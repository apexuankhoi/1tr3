<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ươm Mầm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-green-800">Ươm Mầm Admin</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-500">Quản trị viên: Admin</span>
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold">A</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-10 px-6">
        <header class="mb-10">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Phê duyệt minh chứng</h2>
            <p class="text-gray-500">Danh sách các báo cáo và nhiệm vụ đang chờ bạn xét duyệt.</p>
        </header>

        <div id="submissions-list" class="grid gap-6">
            <!-- Loading state -->
            <div class="text-center py-20 text-gray-400">Đang tải dữ liệu...</div>
        </div>
    </main>

    <script>
        const API_URL = '/api/admin';

        async function fetchSubmissions() {
            try {
                const res = await fetch(`${API_URL}/submissions`);
                const data = await res.json();
                renderSubmissions(data);
            } catch (err) {
                console.error(err);
            }
        }

        function renderSubmissions(submissions) {
            const list = document.getElementById('submissions-list');
            if (submissions.length === 0) {
                list.innerHTML = '<div class="bg-white p-10 rounded-xl border border-gray-100 text-center text-gray-400">Không có minh chứng nào đang chờ duyệt.</div>';
                return;
            }

            list.innerHTML = submissions.map(sub => `
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6 items-start">
                    <div class="w-full md:w-48 h-48 bg-gray-100 rounded-xl overflow-hidden shrink-0">
                        <img src="${sub.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">${sub.title}</h3>
                                <p class="text-green-700 font-semibold text-sm">Người gửi: ${sub.username}</p>
                            </div>
                            <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Pending</span>
                        </div>
                        <p class="text-gray-500 text-sm mb-6">Nhiệm vụ: ${sub.title} | Phần thưởng: <span class="text-green-600 font-bold">${sub.reward} Eco Coins</span></p>
                        
                        <div class="flex gap-3">
                            <button onclick="approve(${sub.id})" class="bg-green-700 hover:bg-green-800 text-white px-6 py-2 rounded-full font-bold transition-colors">Duyệt & Tặng Xu</button>
                            <button onclick="reject(${sub.id})" class="bg-white border border-red-200 text-red-600 hover:bg-red-50 px-6 py-2 rounded-full font-bold transition-colors">Từ chối</button>
                        </div>
                    </div>
                    <div class="text-xs text-gray-400">${new Date(sub.submitted_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function approve(id) {
            if (!confirm('Xác nhận duyệt và cộng xu cho người dùng?')) return;
            await fetch(`${API_URL}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ submissionId: id })
            });
            fetchSubmissions();
        }

        async function reject(id) {
            if (!confirm('Bạn có chắc chắn muốn từ chối minh chứng này?')) return;
            await fetch(`${API_URL}/reject`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ submissionId: id })
            });
            fetchSubmissions();
        }

        fetchSubmissions();
    </script>
</body>
</html>
