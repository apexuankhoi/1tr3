<div class="absolute bottom-0 inset-x-0 h-64 bg-gradient-to-t from-black/80 via-black/50 to-transparent pointer-events-none z-10"></div>

<div class="absolute top-0 left-0 w-full px-margin-mobile py-6 flex justify-between items-center z-20">
<button aria-label="Đóng camera" class="h-touch-target-min w-touch-target-min flex items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-md border border-white/20 active:scale-90 transition-transform shadow-lg">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<div class="bg-black/40 text-white font-label-lg text-label-lg px-6 py-3 rounded-full backdrop-blur-md border border-white/20 shadow-lg">
            Chụp minh chứng
        </div>
<!-- Placeholder to balance flex-between -->
<div class="h-touch-target-min w-touch-target-min"></div>
</div>
<!-- Center Viewfinder / Framing Guide -->
<div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none px-container-padding">
<!-- Viewfinder Reticle -->
<div class="relative w-full max-w-sm aspect-square">
<!-- Corner Accents to simulate focus area -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-[6px] border-l-[6px] border-primary-fixed rounded-tl-[32px] opacity-90 drop-shadow-[0_0_8px_rgba(188,240,174,0.5)]"></div>

<div class="absolute inset-8 border-2 border-dashed border-white/30 rounded-xl"></div>
</div>

</div>

<button class="flex-1 h-touch-target-min max-w-[160px] flex items-center justify-center rounded-full border-2 border-white text-white font-button text-button backdrop-blur-md bg-black/20 hover:bg-white/10 active:scale-95 transition-all duration-200">

        </button>
<button class="flex-[2] h-[64px] flex items-center justify-center gap-3 rounded-full bg-primary text-on-primary font-button text-button shadow-[0_12px_40px_rgba(21,66,18,0.5)] border border-primary-fixed/20 hover:bg-tertiary active:scale-95 transition-all duration-200">
